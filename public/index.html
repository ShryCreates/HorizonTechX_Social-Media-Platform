<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialHub</title>
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="auth-screen" class="screen">
    <div class="auth-box">
      <h1 class="logo"><i class="fa-solid fa-hashtag"></i> SocialHub</h1>
      <p class="tagline">Connect. Share. Explore.</p>
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>
      <form id="login-form" class="auth-form" onsubmit="login(event)">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="auth-error" id="login-error"></p>
      </form>
      <form id="register-form" class="auth-form hidden" onsubmit="register(event)">
        <input type="text" id="reg-username" placeholder="Username" required />
        <input type="email" id="reg-email" placeholder="Email" required />
        <input type="password" id="reg-password" placeholder="Password" required />
        <button type="submit">Create Account</button>
        <p class="auth-error" id="register-error"></p>
      </form>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app-screen" class="screen hidden">

    <!-- Top Navbar (slim) -->
    <nav class="navbar">
      <span class="logo" onclick="showPage('home')"><i class="fa-solid fa-hashtag"></i> SocialHub</span>
      <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search users..." oninput="searchUsers()" />
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>
      <div class="nav-links">
        <label class="dark-toggle" title="Toggle dark mode">
          <input type="checkbox" id="dark-toggle-input" onchange="toggleDarkMode(this.checked)"/>
          <span class="dark-toggle-track"></span>
          <span class="dark-toggle-thumb" id="dark-toggle-thumb">☀️</span>
        </label>
        <button onclick="logout()" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </nav>

    <!-- 3-column shell -->
    <div class="app-shell">

      <!-- ── LEFT SIDEBAR ── -->
      <aside class="left-sidebar">
        <!-- Mini profile card -->
        <div class="card ls-profile" id="ls-profile"></div>

        <!-- Navigation menu -->
        <nav class="ls-nav card">
          <button class="ls-nav-btn active" id="nav-home" onclick="showPage('home')">
            <i class="fa-solid fa-house"></i><span>Home</span>
          </button>
          <button class="ls-nav-btn" id="nav-explore" onclick="showPage('explore')">
            <i class="fa-solid fa-compass"></i><span>Explore</span>
          </button>
          <button class="ls-nav-btn" id="nav-profile" onclick="showPage('profile', currentUser._id)">
            <i class="fa-solid fa-user"></i><span>Profile</span>
          </button>
          <button class="ls-nav-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
          </button>
        </nav>
      </aside>

      <!-- ── CENTER FEED ── -->
      <main class="center-feed">

        <!-- HOME PAGE -->
        <div id="page-home" class="page">
          <div class="create-post card">
            <div class="cp-top">
              <div id="cp-avatar" class="cp-avatar"></div>
              <div class="cp-input-wrap">
                <textarea id="post-content" placeholder="What's happening today?" rows="2"
                  oninput="cpCharCount()" maxlength="500"></textarea>
                <div id="img-preview-wrap" class="img-preview-wrap hidden">
                  <img id="img-preview" src="" alt="preview"/>
                  <button class="remove-img-btn" onclick="removeImage()" title="Remove">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div id="location-tag" class="location-tag hidden">
                  <i class="fa-solid fa-location-dot"></i>
                  <span id="location-text"></span>
                  <button onclick="removeLocation()" title="Remove"><i class="fa-solid fa-xmark"></i></button>
                </div>
              </div>
            </div>
            <div class="cp-divider"></div>
            <div class="cp-toolbar">
              <div class="cp-tools">
                <label class="cp-tool-btn" for="post-image" title="Add photo">
                  <i class="fa-solid fa-image"></i><span>Image</span>
                  <input type="file" id="post-image" accept="image/*" onchange="previewImage(event)" style="display:none"/>
                </label>
                <button class="cp-tool-btn" onclick="toggleEmojiPicker(event)" title="Emoji">
                  <i class="fa-regular fa-face-smile"></i><span>Emoji</span>
                </button>
                <button class="cp-tool-btn" onclick="addLocation()" title="Location">
                  <i class="fa-solid fa-location-dot"></i><span>Location</span>
                </button>
              </div>
              <div class="cp-right">
                <div class="cp-char-wrap" id="cp-char-wrap">
                  <svg class="cp-ring" viewBox="0 0 36 36" aria-hidden="true">
                    <circle class="cp-ring-bg"   cx="18" cy="18" r="15.9"/>
                    <circle class="cp-ring-fill" id="cp-ring-fill" cx="18" cy="18" r="15.9"
                            stroke-dasharray="100 100" stroke-dashoffset="0"/>
                  </svg>
                  <span id="cp-char-num" class="cp-char-num hidden"></span>
                </div>
                <button class="cp-post-btn" onclick="createPost()">
                  <i class="fa-solid fa-paper-plane"></i> Post
                </button>
              </div>
            </div>
            <div id="emoji-picker" class="emoji-picker hidden"></div>
          </div>
          <div id="feed-posts"></div>
        </div>

        <!-- EXPLORE PAGE -->
        <div id="page-explore" class="page hidden">
          <h2 class="page-title">Explore</h2>
          <div id="explore-posts"></div>
        </div>

        <!-- PROFILE PAGE -->
        <div id="page-profile" class="page hidden">
          <div id="profile-header"></div>
          <div id="profile-posts"></div>
        </div>

      </main>

      <!-- ── RIGHT SIDEBAR ── -->
      <aside class="right-sidebar">
        <!-- Mini profile summary -->
        <div class="card rs-profile" id="rs-profile"></div>
        <!-- Suggested users -->
        <div class="card rs-suggested">
          <h4 class="rs-title"><i class="fa-solid fa-user-plus"></i> Who to Follow</h4>
          <div id="suggested-users"><p style="color:var(--muted);font-size:0.85rem;padding:8px 0">Loading…</p></div>
        </div>
        <!-- App info footer -->
        <p class="rs-footer">
          SocialHub © 2026 · <span style="cursor:pointer;color:var(--primary)" onclick="showPage('explore')">Explore</span>
        </p>
      </aside>

    </div><!-- /app-shell -->
  </div><!-- /app-screen -->

  <script src="app.js"></script>
</body>
</html>
